services:
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    platform: ${POSTGRES_PLATFORM:-linux/amd64}
    environment:
      POSTGRES_DB: "seon_history_development"
      POSTGRES_USER: "seon_user"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_this_strong_password}"
      POSTGRES_EXTENSIONS: "timescaledb"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - seon_network

  redis:
    image: redis:latest
    command: redis-server --requirepass "${REDIS_PASSWORD:-change_this_redis_password}"
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - seon_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=postgresql+psycopg://seon_user:${POSTGRES_PASSWORD:-change_this_strong_password}@postgres:5432/seon_history_development
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_this_redis_password}@redis:6379/0
      - CHATBI_API_KEY=${CHATBI_API_KEY:-change_me}
      - CHATBI_RATE_LIMIT=${CHATBI_RATE_LIMIT:-10}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_CHAT_MODEL_A=${OPENAI_CHAT_MODEL_A:-gpt-4o-mini}
      - OPENAI_CHAT_MODEL_B=${OPENAI_CHAT_MODEL_B:-gpt-5.2}
      - OPENAI_SQL_REFINER_MODEL=${OPENAI_SQL_REFINER_MODEL:-gpt-5.2}
      - OPENAI_SQL_TIMEOUT_SECONDS=${OPENAI_SQL_TIMEOUT_SECONDS:-20}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-seon-history}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - SOURCE_POSTGRES_URL=${SOURCE_POSTGRES_URL}
      - SOURCE_POSTGRES_TABLE=${SOURCE_POSTGRES_TABLE:-home_alarms}
      - SOURCE_MONGO_URL=${SOURCE_MONGO_URL}
      - SOURCE_MONGO_DB=${SOURCE_MONGO_DB:-seon_history}
      - SOURCE_MONGO_COLLECTION=${SOURCE_MONGO_COLLECTION:-home_alarms}
    networks:
      - seon_network
    env_file:
      - .env

  frontend:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_KEY=${CHATBI_API_KEY:-change_me}
    networks:
      - seon_network

volumes:
  pgdata:

networks:
  seon_network:
    driver: bridge
    internal: false
